name: Import Shows

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub UI
    inputs:
      date:
        description: "Specific date to import (YYYY-MM-DD). Leave blank for yesterday."
        required: false
        default: ""

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Scrape and import shows
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          IMPORT_DATE: ${{ github.event.inputs.date }}
          IMPORT_ENDPOINT_URL: https://poisonrana.com/api/cron/import-shows-browser
        run: |
          node scripts/import-shows-browser.mjs
